name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ────────────────────────── Python tests ──────────────────────────────────
  pytest:
    name: pytest (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema

      - name: Run pytest
        run: PYTHONPATH=src pytest tests/ -v

  # ────────────────────────── Frontend build ────────────────────────────────
  frontend-build:
    name: Frontend build (Svelte 5 + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install pnpm BEFORE setup-node so the latter can pick it up for caching.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ./frontend
        run: pnpm build

      - name: Verify build output exists
        run: |
          test -f src/gpu_dashboard/static/index.html
          test -d src/gpu_dashboard/static/assets
          ls -la src/gpu_dashboard/static/assets/

  # ────────────────────────── Secret scan ───────────────────────────────────
  # Defense-in-depth on top of GitHub's native push protection. Catches
  # bot tokens / API keys / AWS keys that slipped past local review.
  # The "FAKE|placeholder|example" exclude list lets tests use
  # format-valid synthetic tokens without tripping the scan.
  secret-scan:
    name: Secret leak scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for known secret patterns
        shell: bash
        run: |
          set -uo pipefail
          # Patterns to flag:
          #   Telegram bot token:  <8-12 digits>:<35+ url-safe chars>
          #   GitHub PAT / fine-grained:  gh[pousr]_<36 chars>
          #   AWS access key:  AKIA + 16 uppercase/digits
          #   Slack bot/user/app token:  xox[baprs]-<digits>-...
          #   Stripe live key:  sk_live_<chars>
          PATTERNS=(
            '\b[0-9]{8,12}:[A-Za-z0-9_-]{35,}\b'
            'gh[pousr]_[A-Za-z0-9]{36}'
            'AKIA[0-9A-Z]{16}'
            'xox[baprs]-[0-9A-Za-z-]{10,}'
            'sk_live_[0-9a-zA-Z]{24,}'
          )
          # Filenames + tokens that legitimately match (test placeholders).
          # If a match line contains any of these, it's ignored.
          EXCLUDE='FAKE|fake|placeholder|EXAMPLE|example|node_modules|static/assets|pnpm-lock\.yaml|\.git/'
          FOUND=0
          for pat in "${PATTERNS[@]}"; do
            echo "Scanning pattern: $pat"
            HITS=$(grep -rnE "$pat" . 2>/dev/null \
              | grep -vE "$EXCLUDE" \
              | head -20 || true)
            if [ -n "$HITS" ]; then
              echo "::error::Potential leaked secret found:"
              echo "$HITS"
              FOUND=1
            fi
          done
          if [ "$FOUND" -ne 0 ]; then
            echo
            echo "If this is a known test placeholder, add FAKE/EXAMPLE"
            echo "to the literal so the scan ignores it. If it's a real"
            echo "secret, revoke it immediately and replace with a"
            echo "synthetic value."
            exit 1
          fi
          echo "OK: no leak patterns detected."

  # ────────────────────────── Shell scripts smoke ───────────────────────────
  scripts-smoke:
    name: Sudo scripts smoke (--print / --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Test --print modes (no root needed)
        run: |
          scripts/install-power-limit-wrapper.sh --user ci-test --print | head -20
          scripts/install-coolbits-xorg.sh --print | head -20
          scripts/install-coolbits-xorg.sh --headless --print | head -20
          scripts/install-oculink-watchdog.sh --print | head -20

      - name: Test --check modes (no root needed)
        run: |
          # Should return 0 or 1 (installed or not) but never crash (>1)
          scripts/install-power-limit-wrapper.sh --check && echo "installed" || echo "not installed"
          scripts/install-coolbits-xorg.sh --check && echo "installed" || echo "not installed"

      - name: Test get.sh structure (don't execute clone)
        run: |
          bash -n scripts/get.sh
          grep -q 'set -euo pipefail' scripts/get.sh
          # Verify it's the bootstrap (no sudo calls)
          ! grep -E '^\s*sudo' scripts/get.sh
